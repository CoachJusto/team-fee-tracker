<script>

let currentSection = null;

function showSection(section) {
  document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
  document.getElementById(section).style.display = 'block';
  currentSection = section;
}

function addAthlete() {
  if (!currentSection) {
    alert("Select a section first.");
    return;
  }

  const name = prompt("Enter athlete name:");
  if (!name) return;

  const li = document.createElement("li");
  li.textContent = name;

  // Default style (RED, no background)
  li.style.color = "red";
  li.style.fontWeight = "bold";
  li.style.cursor = "pointer";

  li.onclick = function() {
    if (li.style.color === "red") {
      const confirmChange = confirm("Mark this athlete as confirmed?");
      if (confirmChange) {
        li.style.color = "#44D62C"; // Team green
      }
    }
  };

  document.getElementById(currentSection + "-list").appendChild(li);
}

</script>
